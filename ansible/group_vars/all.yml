cluster_name: labcluster

slurm_user: slurm
munge_user: munge

slurm_conf_dir: /etc/slurm
slurm_conf_path: /etc/slurm/slurm.conf
gres_conf_path: /etc/slurm/gres.conf
cgroup_conf_path: /etc/slurm/cgroup.conf
slurmdbd_conf_path: /etc/slurm/slurmdbd.conf
prometheus_config_path: /etc/prometheus/prometheus.yml

slurmctld_host: "{{ groups['controller'][0] }}"
slurmctld_port: 6817
slurmd_port: 6818
slurmdbd_host: "{{ slurmctld_host }}"
slurmdbd_port: 6819

state_save_location: /var/spool/slurmctld
slurmd_spool_dir: /var/spool/slurmd
slurm_log_dir: /var/log/slurm
slurmdbd_pid_file: /run/slurmdbd.pid
slurmdbd_log_file: "{{ slurm_log_dir }}/slurmdbd.log"

slurm_select_type: select/cons_tres
slurm_select_type_parameters: CR_Core_Memory
slurm_scheduler_type: sched/backfill
slurm_proctrack_type: proctrack/cgroup
slurm_task_plugin: task/cgroup
slurm_job_acct_gather_type: jobacct_gather/linux
slurm_return_to_service: 2
slurm_default_partition: gpu
slurm_gres_types:
  - gpu
slurmdbd_enabled: true
slurm_accounting_storage_type: accounting_storage/slurmdbd
slurm_accounting_tres:
  - billing
  - cpu
  - energy
  - gres/gpu
  - mem
  - node

prometheus_port: 9090
prometheus_scrape_interval: 15s

dcgm_exporter_port: 9400
dcgm_exporter_container_name: dcgm-exporter
dcgm_exporter_image: nvcr.io/nvidia/k8s/dcgm-exporter
dcgm_exporter_base_packages:
  - ca-certificates
  - curl
  - docker.io
  - gnupg

common_packages:
  - chrony
  - munge
  - slurm-client
  - slurm-wlm-basic-plugins
