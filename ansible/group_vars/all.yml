cluster_name: labcluster

slurm_user: slurm
munge_user: munge

slurm_conf_dir: /etc/slurm
slurm_conf_path: /etc/slurm/slurm.conf
gres_conf_path: /etc/slurm/gres.conf
cgroup_conf_path: /etc/slurm/cgroup.conf

slurmctld_host: "{{ groups['controller'][0] }}"
slurmctld_port: 6817
slurmd_port: 6818

state_save_location: /var/spool/slurmctld
slurmd_spool_dir: /var/spool/slurmd
slurm_log_dir: /var/log/slurm

slurm_select_type: select/cons_tres
slurm_select_type_parameters: CR_Core_Memory
slurm_scheduler_type: sched/backfill
slurm_proctrack_type: proctrack/cgroup
slurm_task_plugin: task/cgroup
slurm_return_to_service: 2
slurm_default_partition: gpu
slurm_gres_types:
  - gpu

common_packages:
  - chrony
  - munge
  - slurm-client
  - slurm-wlm-basic-plugins

